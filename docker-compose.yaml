version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chip_design_postgres
    environment:
      POSTGRES_USER: chip_design_user
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: chip_design_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chip_design_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongodb/mongodb-community-server:7.0.15-ubuntu2204
    container_name: chip_design_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: chip_design_user
      MONGO_INITDB_ROOT_PASSWORD: secure_password_here
      MONGO_INITDB_DATABASE: chip_design_artifacts
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: chip_design_timescale
    environment:
      POSTGRES_USER: chip_design_user
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: chip_design_metrics
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chip_design_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: chip_design_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: chip_design_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  timescale_data:
  redis_data:
  minio_data:
