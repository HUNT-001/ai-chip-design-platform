name: AVA CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Syntax check & pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install pydantic pydantic-settings python-dotenv pyyaml httpx tenacity loguru

      - name: Syntax check — all Python files
        run: |
          echo "Checking syntax of all .py files..."
          failed=0
          while IFS= read -r -d '' f; do
            python -m py_compile "$f" || { echo "FAIL: $f"; failed=1; }
          done < <(find . -name "*.py" -not -path "./_legacy/*" -not -path "./.git/*" -print0)
          exit $failed

      - name: Run pytest (pure-Python agents, no EDA tools)
        run: |
          python -m pytest tests/test_agents.py \
            -k "not test_ava_generate_suite_smoke" \
            --import-mode=importlib \
            -p no:cacheprovider \
            --tb=short -q

      - name: Validate JSON schemas
        run: |
          python - << 'EOF'
          import json, sys
          from pathlib import Path

          schema_files = list(Path(".").rglob("*.schema.json"))
          schema_files = [p for p in schema_files if "_legacy" not in str(p)]
          if not schema_files:
              print("WARNING: No schema files found")
              sys.exit(0)

          failed = []
          for p in schema_files:
              try:
                  data = json.loads(p.read_text())
                  assert isinstance(data, dict), f"{p}: not a JSON object"
                  print(f"  OK  {p}")
              except Exception as e:
                  print(f"  FAIL {p}: {e}")
                  failed.append(str(p))

          if failed:
              print(f"\n{len(failed)} schema(s) failed validation")
              sys.exit(1)
          print(f"\nAll {len(schema_files)} schema(s) valid")
          EOF

      - name: Check all agent modules importable
        run: |
          python - << 'EOF'
          import importlib, sys
          sys.path.insert(0, ".")

          modules = [
              "AGENT_H.agent_h_intent",
              "AGENT_H.confidence_scorer",
              "AGENT_H.formal_fuzzer",
              "AGENT_H.digital_twin",
              "AGENT_H.explainer",
              "AGENT_H.contract_dsl",
              "AGENT_H.temporal_checker",
              "AGENT_H.security_intel",
              "AGENT_H.economics_engine",
              "AGENT_H.cross_domain",
              "AGENT_H.knowledge_graph",
              "AGENT_H.minimizer",
              "AGENT_H.root_cause_localizer",
              "AGENT_G.causal_engine",
          ]

          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f"  OK  {mod}")
              except Exception as e:
                  print(f"  FAIL {mod}: {e}")
                  failed.append(mod)

          if failed:
              print(f"\n{len(failed)} module(s) failed to import")
              sys.exit(1)
          print(f"\nAll {len(modules)} modules importable")
          EOF

  ava-smoke-test:
    name: AVA orchestrator smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install pydantic pydantic-settings python-dotenv pyyaml httpx tenacity loguru

      - name: AVA end-to-end smoke test
        run: |
          python - << 'EOF'
          import asyncio, sys
          sys.path.insert(0, ".")
          import ava_patched

          SAMPLE_RTL = """
          module riscv_core (
              input  wire clk, rst,
              input  wire [31:0] instr_in,
              output reg  [31:0] data_out
          );
              reg [31:0] pc;
          endmodule
          """

          async def main():
              ava = ava_patched.AVA(
                  enable_llm=False,
                  enable_database=False,
                  enable_extended=True,
                  run_base_dir="/tmp/ava_ci",
                  timeout=60,
                  target_coverage=50.0,
              )
              result = await ava.generate_suite(
                  rtl_spec=SAMPLE_RTL,
                  microarch="in_order",
                  seed=1,
                  save_results=False,
              )
              assert result["status"] == "completed", f"status={result['status']}"
              assert "extended_reports" in result
              print(f"AVA smoke test PASSED")
              print(f"  extended agents ran: {list(result['extended_reports'].keys())}")
              conf = result['extended_reports'].get('confidence', {})
              print(f"  confidence: {conf.get('score','N/A')} ({conf.get('band','N/A')})")

          asyncio.run(main())
          EOF
